<!DOCTYPE html>
<html lang="en">

<head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文艺复兴 - Play</title>
    <link rel="preload" href="https://lf3-cdn-tos.bytecdntp.com/cdn/expire-1-M/bulma/0.9.3/css/bulma.min.css" as="style"
        onload="this.onload=null;this.rel='stylesheet'">
</head>

<body>
    <div id="game"></div>
    <script type="module" src="/src/Game.tsx"></script>
    <div>
        <div id="header">
        </div>


        <div class="columns is-centered">
            <div class="container column is-half">
                <div class="block" id="select_Song">
                    <div class="card">
                        <div class="card-image">
                            <figure class="image">
                                <img id="song_img" alt="Cover">
                            </figure>
                        </div>
                        <footer class="card-footer">
                            <a id="prev_song" class="card-footer-item">Prev</a>
                            <a id="next_song" class="card-footer-item">Next</a>
                        </footer>
                    </div>
                </div>
            </div>
        </div>
        <div id="img_box"
            style="width:800px ; height: 400px; background-color: bisque; margin-top: 50px; display: none;">
            <center>
                <canvas style="width: 800px; background-color: rgb(255, 255, 255);" id="draw_result"></canvas>
            </center>
            <button id="remake_button">重新选择</button>
        </div>
        </center>
    </div>

    <center>
        <dixv style="position: relative; margin-top: 1%; background-color: blueviolet; width: 100%; height: 50px;">
            <span>歌词</span>
        </dixv>
    </center>

    <center>

        <div style="width: 10%;height:400px;background-color: cadetblue; float: left;">
            <div id="song">
                <button id="game_start" value="" type="button">game_start</button>
            </div>

        </div>
    </center>

    <div style="width: 80%;height: 400px;background-color: antiquewhite;float:right ;">
        <div>
            <canvas style="width: 100%; background-color: rgb(255, 255, 255);" id="draw_all"></canvas>
        </div>
    </div>

    </div>
    <audio id="key_output1"></audio>
    <audio id="key_output2"></audio>
</body>

</html>
<script type="text/javascript" src="/js/index.js"></script>
<script type="text/javascript" src="/js/about_canvas.js"></script>
<script type="text/javascript" src="/js/key_sound.js"></script>
<script type="text/javascript" src="/js/play.js"></script>
<script type="text/javascript" src="/js//select_song.js"></script>
<script type="text/javascript" src="/js/song_info.js"></script>
